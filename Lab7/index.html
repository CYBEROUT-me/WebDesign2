<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 7 – Strings &amp; Date</title>
  <link rel="stylesheet" href="css/style.css">

<body>
  <h1>Lab 7 – Strings &amp; Date</h1>

  <!-- Task 1: Date formatter -->
  <section>
    <h2>Task 1 – Поточний час</h2>
    <p class="hint">Функція, яка повертає і виводить поточний час у заданому форматі.</p>
    <button onclick="updateTime()">Оновити час</button>
    <div id="time-display" class="time-display"></div>
  </section>

  <!-- Task 2: Guess the number game -->
  <section>
    <h2>Task 2 – Гра "Вгадай число"</h2>
    <p class="hint">
      Програма генерує число від 0 до 50. Вгадайте його!
      Після кожної спроби програма підкаже: холодно / тепло / гаряче.<br>
      Результати спроб виводяться в консолі.
    </p>
    <button onclick="startGame()">Почати гру</button>
  </section>

  <script src="js/main.js"></script>

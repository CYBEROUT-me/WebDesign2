<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Legacy – JS Fundamentals</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Lab Legacy – JavaScript Fundamentals</h1>

  <!-- Task 1: Prime numbers -->
  <section>
    <h2>Task 1 – Prime Numbers (0–100, while loop)</h2>
    <button id="btn-primes">Show Primes</button>
    <div id="result-primes" class="result-box"></div>
  </section>

  <!-- Task 2: Even/Odd classifier -->
  <section>
    <h2>Task 2 – Even / Odd Classifier (do...while)</h2>
    <button id="btn-evenodd">Classify 0–10</button>
    <div id="result-evenodd" class="result-box"></div>
  </section>

  <!-- Task 3: Division loop -->
  <section>
    <h2>Task 3 – Division Loop (10000 ÷ 2 until &lt; 50)</h2>
    <button id="btn-division">Run Loop</button>
    <div id="result-division" class="result-box"></div>
  </section>

  <!-- Task 4: Season detector -->
  <section>
    <h2>Task 4 – Season Detector</h2>
    <div class="input-group">
      <input type="number" id="input-month" min="1" max="12" placeholder="Month (1–12)">
      <button id="btn-season">Detect Season</button>
    </div>
    <div id="result-season" class="result-box"></div>
  </section>

  <!-- Task 5: Temperature converter -->
  <section>
    <h2>Task 5 – Temperature Converter (°C → °F)</h2>
    <div class="input-group">
      <input type="number" id="input-celsius" placeholder="Celsius">
      <button id="btn-temp">Convert</button>
    </div>
    <div id="result-temp" class="result-box"></div>
  </section>

  <!-- Task 6: Day of week -->
  <section>
    <h2>Task 6 – Day of Week</h2>
    <div class="input-group">
      <input type="number" id="input-day" min="1" max="7" placeholder="Day number (1–7)">
      <button id="btn-day">Show Day</button>
    </div>
    <div id="result-day" class="result-box"></div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
